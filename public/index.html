<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Lucky Reels</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600;700&family=Bebas+Neue&display=block" rel="stylesheet" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎰</text></svg>" />
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0d0520;
      touch-action: none;
    }

    /*
     * Phaser's Scale.FIT + CENTER_BOTH sizes the canvas to fit the parent,
     * then centers it using position:absolute + top/left offset.
     * The parent must be position:relative (or fixed) with explicit size.
     */
    #game-container {
      position: fixed;
      inset: 0;
    }

    #game-container canvas {
      display: block;
      image-rendering: auto;
    }

    /* Portrait mobile overlay */
    #rotate-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: #0d0520;
      z-index: 9999;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      color: #ffd700;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 32px;
    }

    #rotate-overlay .icon {
      font-size: 64px;
      animation: rotate-hint 1.5s ease-in-out infinite alternate;
    }

    #rotate-overlay p {
      font-size: 18px;
      color: #ccaaff;
      max-width: 260px;
      line-height: 1.5;
    }

    @keyframes rotate-hint {
      from { transform: rotate(-15deg); }
      to   { transform: rotate(15deg); }
    }

    @media (max-width: 640px) and (orientation: portrait) {
      #rotate-overlay { display: flex; }
    }
  </style>
</head>
<body>
  <div id="rotate-overlay">
    <div class="icon">📱</div>
    <h2>Поверни устройство</h2>
    <p>Игра лучше всего выглядит в горизонтальном режиме</p>
  </div>
  <div id="game-container"></div>
</body>
</html>
